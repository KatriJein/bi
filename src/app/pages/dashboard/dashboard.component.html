<div class="dashboard-page">
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav mode="side" opened class="sidebar">
      <!-- Ваш сайдбар остается без изменений -->
      <div>
        <div
          class="active-interface"
          *ngIf="activeInterface$ | async as activeInterface"
        >
          <h3 class="title">{{ activeInterface.name }}</h3>
        </div>
        <mat-divider></mat-divider>
        <mat-nav-list>
          <ng-container *ngIf="dashboards$ | async as dashboards">
            <ng-container
              *ngIf="activeDashboardId$ | async as activeDashboardId"
            >
              <mat-list-item
                *ngFor="let dash of dashboards"
                class="dashboard-item"
                routerLinkActive="active"
                [class.active]="dash.id === activeDashboardId"
                [routerLink]="['/dashboard', dash.id]"
              >
                <div class="dashboard-item-content">
                  <mat-icon
                    [svgIcon]="dash.iconId || 'chart'"
                    [ngStyle]="{ color: dash.color }"
                    class="dashboard-icon"
                  ></mat-icon>
                  {{ dash.name }}
                </div>
              </mat-list-item>
            </ng-container>
          </ng-container>
        </mat-nav-list>
      </div>
    </mat-sidenav>

    <mat-sidenav-content>
      <div class="dashboard-content">
        <mat-tab-group
          [(selectedIndex)]="selectedTabIndex"
          class="dashboard-tabs"
        >
          <!-- Вкладка с виджетами -->
          <mat-tab label="Виджеты">
            <div class="widgets-tab-content">
              <div class="dashboard-header">
                <div class="actions">
                  <button
                    mat-button
                    color="primary"
                    class="refresh-widget-button"
                    (click)="onRefreshWidgets()"
                  >
                    <mat-icon>refresh</mat-icon>
                    Обновить
                  </button>
                  <button
                    mat-flat-button
                    [matMenuTriggerFor]="addWidgetMenu"
                    color="primary"
                    class="add-widget-button"
                  >
                    Добавить виджет
                  </button>
                </div>
                <mat-menu #addWidgetMenu="matMenu">
                  <button mat-menu-item (click)="openWidgetDialog('text')">
                    Текст
                  </button>
                  <button mat-menu-item (click)="openWidgetDialog('chart')">
                    График
                  </button>
                </mat-menu>
              </div>
              <div #gridStackContainer class="grid-stack"></div>
              <ng-template #widgetHost></ng-template>
            </div>
          </mat-tab>

          <!-- Вкладка с расширенной таблицей -->
          <mat-tab label="Детализация" [disabled]="!expandedChartId">
            <div class="expanded-table-tab-content" *ngIf="expandedChartId">
              <div class="expanded-table-header">
                <button mat-button (click)="selectedTabIndex = 0">
                  <mat-icon>arrow_back</mat-icon>
                  Назад к виджетам
                </button>
                <h3 *ngIf="expandedChartFilter">
                  {{ expandedChartName }}
                </h3>
              </div>
              <app-chart-container
                [chartId]="expandedChartId"
                [initialFilters]="expandedChartFilter"
                (chartClick)="handleChartExpanded($event)"
              ></app-chart-container>
              <!-- <app-table-renderer
                [tableId]="expandedChartId"
                [initialFilter]="expandedChartFilter"
                (tableDoubleClick)="handleChartExpanded($event)"
              >
              </app-table-renderer> -->
            </div>
          </mat-tab>
        </mat-tab-group>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
