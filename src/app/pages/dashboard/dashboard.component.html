<div class="dashboard-page">
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav mode="side" opened class="sidebar">
      <div>
        <div class="navigation">
          <app-main-button />
          <button
            mat-icon-button
            class="nav-button"
            [routerLink]="['/settings']"
          >
            <mat-icon>settings</mat-icon>
          </button>
        </div>
        <div
          class="active-interface"
          *ngIf="activeInterface$ | async as activeInterface"
        >
          <h3 class="title">{{ activeInterface.name }}</h3>
        </div>

        <mat-divider></mat-divider>

        <mat-nav-list>
          <ng-container *ngIf="dashboards$ | async as dashboards">
            <ng-container
              *ngIf="activeDashboardId$ | async as activeDashboardId"
            >
              <dashboard-menu-item
                *ngFor="let dashboard of dashboards"
                [dashboard]="dashboard"
                [activeDashboardId]="activeDashboardId"
                [level]="0"
              ></dashboard-menu-item>
            </ng-container>
          </ng-container>
        </mat-nav-list>
      </div>
    </mat-sidenav>

    <mat-sidenav-content>
      <div class="dashboard-content">
        <div [hidden]="isDetailMode()" class="widgets-mode">
          <div class="dashboard-header">
            <div class="actions">
              <button
                mat-button
                color="accent"
                *ngIf="expandedChartId"
                (click)="isDetailMode.set(true)"
                class="detail-mode-button"
              >
                К детализации
                <mat-icon>arrow_forward</mat-icon>
              </button>

              <div class="right-actions">
                <button
                  mat-button
                  color="primary"
                  class="refresh-widget-button"
                  (click)="onRefreshWidgets()"
                >
                  <mat-icon>refresh</mat-icon>
                  Обновить
                </button>

                <button mat-button (click)="toggleEditMode()">
                  <mat-icon>{{ isEditMode() ? "lock" : "edit" }}</mat-icon>
                  {{ isEditMode() ? "Заблокировать" : "Редактировать" }}
                </button>

                <button
                  mat-flat-button
                  *ngIf="isEditMode()"
                  [matMenuTriggerFor]="addWidgetMenu"
                  color="primary"
                  class="add-widget-button"
                >
                  <mat-icon>add</mat-icon>
                  Добавить виджет
                </button>

                <button mat-button (click)="toggleFilters()">
                  <mat-icon>filter_alt</mat-icon>
                  Фильтр
                </button>
              </div>
            </div>

            <mat-menu #addWidgetMenu="matMenu">
              <button mat-menu-item (click)="openWidgetDialog('text')">
                Текст
              </button>
              <button mat-menu-item (click)="openWidgetDialog('chart')">
                График
              </button>
            </mat-menu>
          </div>

          <!-- Блок фильтров -->
          <div class="filters-container" [hidden]="!showFilters">
            <mat-chip-listbox
              aria-label="Filters list"
              *ngIf="(filters$ | async)?.length"
            >
              <mat-chip-option
                *ngFor="let filter of filters$ | async"
                [selectable]="false"
                (click)="onFilterClick(filter)"
                [removable]="true"
                (removed)="removeFilter(filter)"
              >
                <div class="filter-chip-content">
                  <span class="filter-name">{{ filter.name }}</span>
                  <span class="filter-details"
                    >{{ filter.filterType }}:
                    {{ formatFilterValue(filter) }}</span
                  >
                </div>
                <mat-icon matChipRemove>cancel</mat-icon>
              </mat-chip-option>
            </mat-chip-listbox>

            <button
              mat-flat-button
              color="primary"
              (click)="openAddFilterDialog()"
              class="add-filter-btn"
            >
              <mat-icon>add</mat-icon>
              Добавить фильтр
            </button>
          </div>

          <div
            #gridStackContainer
            class="grid-stack"
            [class.edit-mode]="isEditMode()"
            [class.read-mode]="!isEditMode()"
          ></div>
          <ng-template #widgetHost></ng-template>
        </div>

        <!-- Режим детализации -->
        <div [hidden]="!isDetailMode()" class="detail-mode">
          <div class="detail-mode-header">
            <button mat-button (click)="backToWidgets()">
              <mat-icon>arrow_back</mat-icon>
              К виджетам
            </button>
            <h3 *ngIf="expandedChartName">
              {{ expandedChartName }}
            </h3>
          </div>
          <app-chart-container
            *ngIf="expandedChartId"
            [chartId]="expandedChartId"
            [initialFilters]="expandedChartFilter"
            (chartClick)="handleChartExpanded($event)"
          ></app-chart-container>
        </div>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
