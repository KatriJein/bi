<div class="layout-container">
  <div class="dataset-header">
    <div class="dataset-title">
      <mat-icon class="title-icon">storage</mat-icon>
      <mat-form-field appearance="outline" class="dataset-input">
        <input
          matInput
          [formControl]="nameControl"
          placeholder="Введите название датасета"
        />
      </mat-form-field>
    </div>

    <div class="header-actions">
      <button
        mat-stroked-button
        color="warn"
        (click)="onDelete()"
        class="action-btn"
      >
        <mat-icon>delete</mat-icon>
        Удалить
      </button>
      <div class="action-group">
        <button mat-button (click)="onCancel()" class="secondary-btn">
          Отменить
        </button>
        <button
          mat-flat-button
          color="primary"
          (click)="onSave()"
          class="primary-btn"
        >
          <mat-icon>save</mat-icon>
          Сохранить
        </button>
      </div>
    </div>
  </div>
  <div class="name-row">
    <mat-tab-group class="tabs" (selectedTabChange)="handleTabChange($event)">
      <mat-tab>
        <ng-template mat-tab-label class="mat-tab-label">
          <mat-icon>source</mat-icon>
          Источники данных
        </ng-template>
        <app-tables
          *ngIf="currentTab === 'tables'"
          class="tab-content"
        ></app-tables>
      </mat-tab>
      <mat-tab>
        <ng-template mat-tab-label class="mat-tab-label">
          <mat-icon>view_column</mat-icon>
          Настройка полей
        </ng-template>
        <app-columns-table
          *ngIf="currentTab === 'columns'"
          class="tab-content"
        ></app-columns-table>
      </mat-tab>
    </mat-tab-group>
  </div>
