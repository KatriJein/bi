<div class="fullscreen-container">
  <div class="fullscreen-header">
    <h1>{{ title }}</h1>
  </div>

  <div class="widget-content">
    <app-chart-container
      *ngIf="chartId"
      [chartId]="chartId"
      [widgetSelectors]="widgetSelections$"
      (chartClick)="onChartClick($event)"
    ></app-chart-container>
  </div>
</div>
