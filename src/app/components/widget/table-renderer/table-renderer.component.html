<ng-container *ngIf="shouldShowTable$ | async; else loading">
  <app-table
    [rowData]="chartData$ | async"
    [columnDefs]="colDefs$ | async"
    [defaultColDef]="defaultColDef"
    [initialFilters]="filters$ | async"
    (filterRemoved)="onFilterRemoved($event)"
    (cellDoubleClicked)="onTableDoubleClick($event)"
  />
</ng-container>

<ng-template #loading>
  <p>Загрузка таблицы...</p>
</ng-template>
