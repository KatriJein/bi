<ng-container *ngIf="(table$ | async) && (dataset$ | async)">
  <app-table
    [rowData]="chartData$ | async"
    [columnDefs]="colDefs$ | async"
    [defaultColDef]="defaultColDef"
    [initialFilter]="initialFilter"
    (cellDoubleClicked)="onTableDoubleClick($event)"
  />
</ng-container>

<ng-template #loading>
  <p>Загрузка таблицы...</p>
</ng-template>
