<h2 mat-dialog-title>
  {{ isEditMode ? "Редактировать фильтр" : "Добавить фильтр" }}
</h2>

<div mat-dialog-content>
  <form [formGroup]="filterForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Имя фильтра</mat-label>
      <input
        matInput
        formControlName="name"
        required
        placeholder="Введите имя фильтра"
      />
      <mat-error *ngIf="filterForm.get('name')?.hasError('required')">
        Имя фильтра обязательно
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Тип колонки</mat-label>
      <mat-select formControlName="type" required>
        <mat-option *ngFor="let type of columnTypes" [value]="type">
          {{ getNameOfType(type) }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="filterForm.get('type')?.hasError('required')">
        Выберите тип колонки
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Тип фильтра</mat-label>
      <mat-select formControlName="filterType" required>
        <mat-option *ngFor="let type of filterTypes" [value]="type">
          {{ type }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="filterForm.get('filterType')?.hasError('required')">
        Выберите тип фильтра
      </mat-error>
    </mat-form-field>

    <ng-container *ngIf="currentInputType !== 'date'; else dateInputs">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ getValuePlaceholder() }}</mat-label>
        <input
          matInput
          formControlName="value"
          required
          [type]="currentInputType"
          [placeholder]="getValuePlaceholder()"
        />
        <mat-error *ngIf="filterForm.get('value')?.hasError('required')">
          Введите значение
        </mat-error>
      </mat-form-field>
    </ng-container>

    <ng-template #dateInputs class="date-inputs">
      <app-date-input
        class="selection-date-input"
        label="{{
          filterForm.get('filterType')?.value === DATE_RANGE_FILTER
            ? 'Дата от'
            : 'Дата'
        }}"
        [(dateValue)]="filterValueDateRange[0]"
        (dateValueChange)="onDateRangeChange(0, $event)"
      ></app-date-input>

      <app-date-input
        *ngIf="filterForm.get('filterType')?.value === DATE_RANGE_FILTER"
        class="selection-date-input"
        label="Дата до"
        [(dateValue)]="filterValueDateRange[1]"
        (dateValueChange)="onDateRangeChange(1, $event)"
      ></app-date-input>
    </ng-template>
  </form>
</div>

<div mat-dialog-actions>
  <button mat-button (click)="onCancel()">Отмена</button>
  <button
    mat-button
    color="primary"
    (click)="onSave()"
    [disabled]="filterForm.invalid"
  >
    Сохранить
  </button>
</div>
