<div class="wrapper">
  <app-chart-renderer
    *ngIf="isChart$ | async"
    [chartId]="chartId"
    [initialFilters]="combinedFilters$ | async"
    (chartClick)="handleClick($event)"
  />

  <app-table-renderer
    *ngIf="isTable$ | async"
    [tableId]="chartId"
    [initialFilters]="combinedFilters$ | async"
    (tableDoubleClick)="handleClick($event)"
  />
</div>
