<h2 mat-dialog-title>{{ isEditMode ? 'Редактировать отбор' : 'Добавить отбор' }}</h2>
<div mat-dialog-content [formGroup]="form" class="dialog-content">

  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Название отбора</mat-label>
    <input matInput formControlName="name" placeholder="Введите название">
    <mat-error *ngIf="form.get('name')?.hasError('required')">
      Пожалуйста, введите название
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Колонка</mat-label>
    <mat-select formControlName="column">
      <mat-option *ngFor="let column of columns$ | async" [value]="column">
        {{ column.alias }}
      </mat-option>
    </mat-select>
    <mat-error *ngIf="form.get('column')?.hasError('required')">
      Пожалуйста, выберите колонку
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Тип фильтра</mat-label>
    <mat-select formControlName="filterType">
      <mat-option *ngFor="let filter of filterOptions" [value]="filter">
        {{ filter }}
      </mat-option>
    </mat-select>
    <mat-error *ngIf="form.get('filterType')?.hasError('required')">
      Пожалуйста, выберите тип фильтра
    </mat-error>
  </mat-form-field>
</div>
<div mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Отмена</button>
  <button
    mat-raised-button
    color="primary"
    (click)="onSave()"
    [disabled]="form.invalid"
  >
    Сохранить
  </button>
</div>
