<h2 mat-dialog-title>Создание дашборда</h2>

<mat-dialog-content [formGroup]="form" class="dialog-content">
  <mat-form-field appearance="outline" class="full-width input">
    <mat-label>Интерфейс</mat-label>
    <mat-select formControlName="interfaceId">
      <mat-option
        *ngFor="let interface of interfaces$ | async"
        [value]="interface.id"
      >
        {{ interface.name }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width input">
    <mat-label>Название дашборда</mat-label>
    <input
      matInput
      placeholder="Введите название"
      formControlName="name"
      maxlength="52"
    />
    <mat-hint align="end"
      >{{ form.get("name")?.value?.length || 0 }}/52</mat-hint
    >
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Отмена</button>
  <button
    mat-flat-button
    color="primary"
    (click)="onSave()"
    [disabled]="form.invalid"
  >
    Сохранить
  </button>
</mat-dialog-actions>
